<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GlenOS Processor v0.5.2</title>
<style>
:root{--ink:#172033;--muted:#667085;--bg:#f5f7fb;--card:#fff;--blue:#3859d6;--line:#dce2ef;--soft:#edf1ff;--ok:#087a55}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:17px/1.55 system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1180px;margin:auto;padding:24px}header{display:flex;justify-content:space-between;align-items:end;gap:16px;margin-bottom:18px}h1{font-size:clamp(28px,5vw,44px);margin:0;letter-spacing:-.04em}header p{margin:2px 0;color:var(--muted)}.badge{background:#dff7eb;color:var(--ok);padding:6px 12px;border-radius:20px;font-weight:700;font-size:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 8px 30px #16203a0a;margin-bottom:16px}.step{font-size:13px;font-weight:800;letter-spacing:.1em;color:var(--blue);text-transform:uppercase}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.fields{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}label{display:block;font-weight:700;margin:8px 0 5px}textarea,input,select{width:100%;border:1px solid #bdc7da;border-radius:10px;padding:11px 12px;background:#fff;color:var(--ink);font:inherit}textarea{min-height:210px;resize:vertical}.smallarea{min-height:95px}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:13px}button{border:0;border-radius:10px;padding:11px 15px;font:700 15px system-ui;cursor:pointer;background:var(--soft);color:#263d9b}button.primary{background:var(--blue);color:#fff}button.secondary{background:#172033;color:#fff}button:hover{filter:brightness(.97)}.outputTabs button.active{background:var(--blue);color:white}.preview{white-space:pre-wrap;background:#fbfcff;border:1px solid var(--line);border-radius:12px;padding:18px;min-height:330px;max-height:590px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:14px}.hint{color:var(--muted);font-size:14px}.status{color:var(--ok);font-weight:700;min-height:24px}.hidden{display:none}@media(max-width:800px){.grid,.fields{grid-template-columns:1fr}header{align-items:start;flex-direction:column}.wrap{padding:14px}.card{padding:15px}}
</style>
</head>
<body><main class="wrap">
<header><div><h1>GlenOS Processor</h1><p>Capture once. Shape the meaning. Output anywhere.</p></div><span class="badge">Prototype v0.5.2 · Offline</span></header>
<section class="card"><div class="step">1 · Capture</div><label for="source">Speak or paste your note</label><textarea id="source" placeholder="Example: Journal. I tried to log in several times and my marks disappeared. I felt frustrated and overwhelmed. I need to check whether they can be recovered. Output: Both."></textarea><div class="actions"><button class="primary" id="process">Process note</button><button id="mic">🎙 Start voice</button><button id="example">Load example</button><button id="clear">Clear</button></div><p class="hint">Tip: Say “Journal”, “Project”, “Research” or “Portuguese” at the start. Say “Output: Apple”, “Markdown”, “Both” or “All” at the end.</p></section>
<section class="card"><div class="step">2 · Review the meaning</div><div class="fields"><div><label>Title</label><input id="title"></div><div><label>Module</label><select id="module"><option>journal</option><option>projects</option><option>research</option><option>learning</option><option>portuguese</option><option>meetings</option><option>weekly-review</option><option>inbox</option></select></div><div><label>Area</label><select id="area"><option>personal</option><option>family-care</option><option>home</option><option>finance</option><option>technology</option><option>learning</option><option>work</option><option>uncategorised</option></select></div></div><div class="grid"><div><label>Summary</label><textarea class="smallarea" id="summary"></textarea><label>Facts / what happened (one per line)</label><textarea class="smallarea" id="facts"></textarea><label>Feelings (one per line)</label><textarea class="smallarea" id="feelings"></textarea></div><div><label>Actions (one per line)</label><textarea class="smallarea" id="actions"></textarea><label>Reflections / insights (one per line)</label><textarea class="smallarea" id="reflections"></textarea><label>Tags (comma separated)</label><input id="tags"><label>Uncertain items (one per line)</label><textarea class="smallarea" id="uncertain"></textarea></div></div><div class="actions"><button class="secondary" id="refresh">Refresh outputs</button></div></section>
<section class="card"><div class="step">3 · Use the output</div><div class="actions outputTabs"><button data-format="apple" class="active">Apple Notes</button><button data-format="markdown">Markdown</button><button data-format="mindmanager">MindManager</button><button data-format="thebrain">TheBrain</button><button data-format="json">Master Object</button></div><div id="preview" class="preview"></div><div class="actions"><button class="primary" id="copy">Copy output</button><button id="download">Download</button></div><div class="status" id="status"></div></section>
</main><script>
const $=id=>document.getElementById(id);let format='apple',recognition=null,current={};
const lines=s=>s.split(/\n+/).map(x=>x.trim()).filter(Boolean);const esc=s=>String(s||'').replace(/"/g,'\\"');
function id(){return 'ko-'+new Date().toISOString().replace(/[-:TZ.]/g,'').slice(0,14)+'-'+Math.random().toString(36).slice(2,6)}
function sentenceList(s){return (s.match(/[^.!?]+[.!?]+|[^.!?]+$/g)||[]).map(x=>x.trim()).filter(x=>x.length>4&&!/^output\s*:/i.test(x));}
function detectModule(s){let x=s.toLowerCase();if(/\bjournal|i felt|i feel\b/.test(x))return'journal';if(/\bproject|build|next step\b/.test(x))return'projects';if(/\bportuguese|translate|phrase|vocabulary\b/.test(x))return'portuguese';if(/\bresearch|find out|investigate\b/.test(x))return'research';if(/\bmeeting|agenda|minutes\b/.test(x))return'meetings';if(/\bweekly review|this week\b/.test(x))return'weekly-review';if(/\blearn|learning|understand\b/.test(x))return'learning';return'inbox'}
function detectArea(s){let x=s.toLowerCase();if(/mum|mother|hospital|carer|family/.test(x))return'family-care';if(/bank|tax|money|tenant|rent/.test(x))return'finance';if(/door|house|home|wheelchair/.test(x))return'home';if(/computer|app|software|obsidian|glenos/.test(x))return'technology';if(/business|work|restaurant/.test(x))return'work';if(/learn|portuguese|piano/.test(x))return'learning';return'personal'}
function makeTitle(s){
  let cleaned=String(s||'')
    .replace(/\s*output\s*:\s*(apple(?: notes)?|markdown|both|all|mindmanager|thebrain)\s*[.!?]?\s*$/i,'')
    .replace(/^\s*(journal|project|research|meeting|learning|portuguese)\s*(?:[:.\-–—]|\n)+\s*/i,'')
    .trim();
  let first=sentenceList(cleaned)[0]||cleaned||'Untitled Note';
  let words=first.replace(/^[\s:.,;\-–—]+/,'').split(/\s+/).filter(Boolean).slice(0,8).join(' ');
  return (words||'Untitled Note').replace(/\b\w/g,c=>c.toUpperCase()).replace(/[.!?]$/,'');
}
function process(){let raw=$('source').value.trim();if(!raw)return setStatus('Add a note first.');let ss=sentenceList(raw),acts=[],feel=[],facts=[],refs=[],unc=[];const emotions=['frustrated','excluded','overwhelmed','worried','anxious','angry','sad','happy','relieved','tired','confused','scared'];ss.forEach(s=>{let low=s.toLowerCase();let found=emotions.filter(e=>low.includes(e));feel.push(...found.map(x=>x[0].toUpperCase()+x.slice(1)));if(/\b(i need to|i should|we need to|remember to|next step|must)\b/i.test(s))acts.push(s.replace(/^.*?\b(i need to|i should|we need to|remember to|next step(?: is)?|must)\b\s*/i,'').replace(/^to\s+/i,'').replace(/[.!?]$/,'')+'.');else if(/\b(i think|i realised|i realized|this shows|because|made .* harder)\b/i.test(s))refs.push(s);else facts.push(s)});if(/seem|appeared|maybe|might|not sure|somehow/i.test(raw))unc.push('Part of the source is uncertain and should be checked against the original note.');current={schema_version:'0.5',id:id(),created:new Date().toISOString(),source:raw};$('title').value=makeTitle(raw);$('module').value=detectModule(raw);$('area').value=detectArea(raw);$('summary').value=(ss.slice(0,2).join(' ')||raw).replace(/\s*Output\s*:.*/i,'');$('facts').value=facts.join('\n');$('feelings').value=[...new Set(feel)].join('\n');$('actions').value=acts.join('\n');$('reflections').value=refs.join('\n');$('tags').value=[detectModule(raw),detectArea(raw)].filter(x=>x!=='inbox').join(', ');$('uncertain').value=unc.join('\n');render();setStatus('Processed. Review the fields, then copy your output.')}
function data(){return{schema_version:'0.5',id:current.id||id(),title:$('title').value||'Untitled Note',created:current.created||new Date().toISOString(),updated:new Date().toISOString(),type:$('module').value==='projects'?'project':$('module').value.replace(/s$/,''),module:$('module').value,area:$('area').value,status:'inbox',source:{input_type:'text-or-voice',original_text:$('source').value,language:'en'},content:{summary:$('summary').value,facts:lines($('facts').value),feelings:lines($('feelings').value),actions:lines($('actions').value).map((x,i)=>({id:'act-'+String(i+1).padStart(3,'0'),text:x,owner:'Glen',due:null,status:'open'})),reflections:lines($('reflections').value)},organisation:{tags:$('tags').value.split(',').map(x=>x.trim()).filter(Boolean)},quality:{uncertain_items:lines($('uncertain').value)}}}
function dateLong(d){return new Intl.DateTimeFormat('en-GB',{day:'numeric',month:'long',year:'numeric'}).format(new Date(d))}function bullet(a,p='• '){return a.map(x=>p+x).join('\n')}function section(icon,name,a,p='• '){return a.length?`\n━━━━━━━━━━\n\n${icon} ${name}\n\n${bullet(a,p)}\n`:''}
function apple(o){let x=`${o.title.toUpperCase()}\n\n${dateLong(o.created)}\n\n━━━━━━━━━━\n\n🧭 SUMMARY\n\n• ${o.content.summary}`;x+=section('📌','WHAT HAPPENED',o.content.facts);x+=section('💭','FEELINGS',o.content.feelings);x+=section('💡','REFLECTIONS',o.content.reflections);x+=section('🎯','NEXT ACTIONS',o.content.actions.map(a=>a.text+' — '+a.owner),'☐ ');x+=section('⚠️','UNCERTAIN',o.quality.uncertain_items);x+=`\n━━━━━━━━━━\n\n🏷️ TAGS\n\n• ${o.organisation.tags.join(' • ')}\n\n🔑 ID\n\n• ${o.id}`;return x}
function md(o){let y=o.created.slice(0,10),a=`---\nid: ${o.id}\ntitle: "${esc(o.title)}"\ndate: ${y}\ntype: ${o.type}\nmodule: ${o.module}\narea: ${o.area}\nstatus: inbox\ntags: [${o.organisation.tags.join(', ')}]\n---\n\n# ${o.title}\n\n## Summary\n\n${o.content.summary}`;const add=(h,x,p='- ')=>x.length?`\n\n## ${h}\n\n${bullet(x,p)}`:'';a+=add('What Happened',o.content.facts)+add('Feelings',o.content.feelings)+add('Reflections',o.content.reflections)+add('Next Actions',o.content.actions.map(v=>v.text+' *(Owner: '+v.owner+')*'),'- [ ] ')+add('Uncertain',o.quality.uncertain_items);return a}
function mm(o){let rows=[o.title,'\tSummary','\t\t- '+o.content.summary];const add=(h,x)=>{if(x.length){rows.push('\t'+h);x.forEach(v=>rows.push('\t\t'+v))}};add('What Happened',o.content.facts);add('Feelings',o.content.feelings);add('Reflections',o.content.reflections);add('Next Actions',o.content.actions.map(x=>'☐ '+x.text+' [Owner: '+x.owner+']'));add('Uncertain',o.quality.uncertain_items);add('Tags',o.organisation.tags);rows.push('\tID\n\t\t'+o.id);return rows.join('\n')}
function brain(o){let rows=[o.title,'\t- '+o.content.summary];o.organisation.tags.forEach(x=>rows.push('\t| #'+x));if(o.content.actions.length){rows.push('\tNext Actions');o.content.actions.forEach(x=>rows.push('\t\t- ☐ '+x.text))}if(o.content.facts.length){rows.push('\tDetails');o.content.facts.forEach(x=>rows.push('\t\t- '+x))}return rows.join('\n')}
function render(){let o=data(),out=format==='apple'?apple(o):format==='markdown'?md(o):format==='mindmanager'?mm(o):format==='thebrain'?brain(o):JSON.stringify(o,null,2);$('preview').textContent=out;return out}function setStatus(x){$('status').textContent=x;setTimeout(()=>{if($('status').textContent===x)$('status').textContent=''},3500)}
$('process').onclick=process;$('refresh').onclick=()=>{render();setStatus('Outputs refreshed.')};document.querySelectorAll('[data-format]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-format]').forEach(x=>x.classList.remove('active'));b.classList.add('active');format=b.dataset.format;render()});$('copy').onclick=async()=>{await navigator.clipboard.writeText(render());setStatus('Copied to clipboard.')};$('download').onclick=()=>{let ext=format==='markdown'?'md':format==='json'?'json':'txt',blob=new Blob([render()],{type:'text/plain'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=($('title').value||'glenos-note').toLowerCase().replace(/[^a-z0-9]+/g,'-')+'.'+ext;a.click();URL.revokeObjectURL(a.href);setStatus('Downloaded.')};$('example').onclick=()=>{$('source').value='Journal. I tried to log in a couple of times and somehow lost all my marks. I felt excluded and everything became very frustrating. I had already spent a lot of mental energy on it, and with my dyslexia it became overwhelming. I need to stop, calm down and work out whether the marks can be recovered. Output: Both.';process()};$('clear').onclick=()=>{document.querySelectorAll('textarea,input').forEach(x=>x.value='');current={};render();setStatus('Cleared.')};$('mic').onclick=()=>{let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return setStatus('Voice input is not supported in this browser.');if(recognition){recognition.stop();return}recognition=new SR();recognition.continuous=true;recognition.interimResults=true;let base=$('source').value;recognition.onresult=e=>{let text='';for(let i=0;i<e.results.length;i++)text+=e.results[i][0].transcript;$('source').value=(base+' '+text).trim()};recognition.onend=()=>{recognition=null;$('mic').textContent='🎙 Start voice'};recognition.start();$('mic').textContent='■ Stop voice'};render();
</script></body></html>
